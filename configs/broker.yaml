# broker.yaml — broker connectivity and session policy (blueprint Part VII).
#
# NOT hashed (operational). Reconnect/retry behaviour and the client-id convention are
# how the platform talks to a gateway, not what it computes. Per-broker hosts/ports and
# credentials live in the broker package's own config (infra-ibkr) and in the gitignored
# `.env`, never here.
#
# Loaded by the connectivity supervisor via `load_broker_config(configs/)` →
# `BrokerConfig` (C7). The backoff overflow guard (`_MAX_BACKOFF_EXPONENT`) stays a code
# constant — a float-overflow cap, not a tunable.
version: "2026.06"

client_id_bands:             # disjoint gateway client-id bands, one per service, so two
  universe: 1000             # services connecting to one gateway never collide
  collector: 2000
  replay: 3000
  smoke: 9000
client_id_band_width: 1000   # instance id = band + instance, instance in [0, band_width)

reconnect:                   # BackoffSchedule: delay_for(attempt) = min(cap, base * factor**attempt)
  base_seconds: 1.0
  factor: 2.0
  cap_seconds: 30.0
