# pricing.yaml — IV inversion, surface-fit, and forward-estimate parameters (blueprint
# Part VII).
#
# HASHED (config_hashes["pricing"]). Solver tolerances/bounds, the SVI fit bounds, and
# the forward-confidence heuristics change computed values, so they are reproducibility
# inputs. Three sections live here side by side: `solver:` (the IV inversion),
# `surface:` (the SVI calibration), and `forward:` (the parity forward estimate).
#
# OPTIONAL `effective_from: YYYY-MM-DD` at this file root dates the bundle (ADR 0028 as-of
# resolution): a replay `load_platform_config(configs/, as_of=D)` refuses a bundle whose
# `effective_from` is after D, so a past day can never silently pick up config authored
# later (look-ahead). It is dating metadata, not economics — stripped before validation,
# absent from the reproducibility hash. Omit it (as shipped) for "current".

solver:                        # IV inversion (SolverConfig)
  version: "2026.05.31"
  iv_tolerance: 1.0e-8         # implied-vol inversion convergence tolerance
  max_iterations: 100
  vol_min: 1.0e-9             # search-bracket floor (stands in for "zero vol")
  vol_max: 5.0               # search-bracket ceiling (500% annualized; above it is unresolvable)

surface:                       # SVI calibration (SurfaceConfig)
  version: "2026.05.31"
  svi_a_bounds: [0.0, 10.0]          # level (total variance). The 0.0 floor is the parametrization's
                                     # natural sink: on a low-variance (ultra-short) slice the optimizer
                                     # drives a→0 and carries the level in the b·σ·√(1−ρ²) wing-vertex
                                     # term, producing an identical, well-formed curve (tiny RMSE, sane
                                     # ATM vol). The 2026-06-16 settled-close SX5E had a→0 on 523/630
                                     # slices, all with a POSITIVE minimum total variance — a benign
                                     # parametrization artifact, not a degenerate fit. Kept at 0.0 (the
                                     # math floor); the QC `surface_fit_error` check now treats an
                                     # `a_lower` bound-hit as benign when w_min>0 (it stays LOGGED per
                                     # blueprint 12:70, but does not FAIL QC). See
                                     # tasks/infra-surface-fit-quality-findings.md.
  svi_b_bounds: [1.0e-8, 10.0]       # wing slope, strictly > 0
  svi_rho_bounds: [-0.999, 0.999]    # skew, strictly inside (-1, 1). KEPT (decision 2026-06-17,
                                     # evidence-based): ρ cannot be relaxed past (−1, 1) — the SVI is
                                     # ill-defined at |ρ|=1. The 2026-06-16 settled-close ρ→−0.999 rails
                                     # were NOT the nappe defect: they concentrate at the ultra-short end
                                     # (T<0.038y, ~2wk), where the few that also breach butterfly arb are
                                     # correctly FAILED by `surface_fit_error` (arb), and the arb-free
                                     # extreme-skew rails are a real, logged boundary hit. The liquid
                                     # core (T>0.25y) does NOT rail ρ. Widening ρ is neither possible nor
                                     # the lever; the lever is the upstream ultra-short handling.
  svi_m_bounds: [-5.0, 5.0]          # shift (log-moneyness)
  svi_sigma_bounds: [1.0e-8, 10.0]   # curvature, strictly > 0
  svi_bound_hit_tol: 1.0e-5          # "at the bound" detection, relative to each range
  svi_max_iterations: 200            # least-squares evaluation budget per parameter
  model: svi                         # primary calibration model (the only implemented fit)
  fallback_model: nonparametric      # sparse-slice fallback — linear interp in total variance.
                                     # Honestly named for what the code does; blueprint 07 calls
                                     # it "spline", but the shipped fallback is linear interp, so
                                     # this is NOT encoded as "spline" (config describes the code).
  min_points_per_slice: 5            # distinct strikes required before SVI is trusted; below it
                                     # the slice routes to the nonparametric fallback. Floored at
                                     # 5 = SVI's parameter count; raise to demand more points.
  moneyness_buckets: [-0.2, -0.1, 0.0, 0.1, 0.2]   # log-moneyness grid the regularized surface is
                                     # projected/persisted onto (one grid cell per bucket). Strictly
                                     # increasing + symmetric about 0.0 (the ATM forward) so the
                                     # persisted grid is comparable across underlyings.

forward:                       # parity forward-estimate confidence heuristics (ForwardConfig)
  version: "2026.05.31"
  good_rel_residual: 1.0e-3          # rel. residual at/below which (with >=3 pairs) quality is "good"
  fair_rel_residual: 1.0e-2          # rel. residual at/below which (with >=2 pairs) quality is "fair"
  full_credit_pairs: 4.0             # used-pair count at which the count term saturates to 1.0
  rel_residual_halflife: 1.0e-3      # relative residual that halves the fit term
  single_pair_confidence: 0.30       # confidence for a one-pair fallback (structurally low)
  rate: null                         # explicit interest rate r (flat) for the carry/dividend split
                                     # q = r − ln(F/S)/T (Eq 5). null = use the parity-DF-implied
                                     # rate −ln(DF)/T (unchanged); set a number (e.g. 0.0) to make
                                     # r an explicit, modifiable input (T-explicit-rate-parameter).
  # Forward-engine policy (blueprint 07 `forward_engine`; lands in this block, not a separate one).
  max_candidate_count: null          # cap on call/put pairs fed to one maturity's parity regression.
                                     # null = no cap (every valid pair, unchanged); set an int >= 2 to
                                     # keep the most-liquid N (tie-break strike). Blueprint's 12 is an
                                     # owner-enabled value (it moves the analytics golden when binding).
  outlier_method: mad                # robust outlier screen before refit: "mad" (MAD z-score, shipped)
                                     # or "none" (disable rejection — every candidate feeds the fit).
  max_robust_zscore: 3.5             # scaled-MAD cut-off a residual is flagged beyond (Eq 24); 3.5 =
                                     # the shared robust default, so the screen is unchanged until tuned.
