# pricing.yaml — IV inversion, surface-fit, and forward-estimate parameters (blueprint
# Part VII).
#
# HASHED (config_hashes["pricing"]). Solver tolerances/bounds, the SVI fit bounds, and
# the forward-confidence heuristics change computed values, so they are reproducibility
# inputs. Three sections live here side by side: `solver:` (the IV inversion),
# `surface:` (the SVI calibration), and `forward:` (the parity forward estimate).

solver:                        # IV inversion (SolverConfig)
  version: "2026.05.31"
  iv_tolerance: 1.0e-8         # implied-vol inversion convergence tolerance
  max_iterations: 100
  vol_min: 1.0e-9             # search-bracket floor (stands in for "zero vol")
  vol_max: 5.0               # search-bracket ceiling (500% annualized; above it is unresolvable)

surface:                       # SVI calibration (SurfaceConfig)
  version: "2026.05.31"
  svi_a_bounds: [0.0, 10.0]          # level (total variance)
  svi_b_bounds: [1.0e-8, 10.0]       # wing slope, strictly > 0
  svi_rho_bounds: [-0.999, 0.999]    # skew, strictly inside (-1, 1)
  svi_m_bounds: [-5.0, 5.0]          # shift (log-moneyness)
  svi_sigma_bounds: [1.0e-8, 10.0]   # curvature, strictly > 0
  svi_bound_hit_tol: 1.0e-5          # "at the bound" detection, relative to each range
  svi_max_iterations: 200            # least-squares evaluation budget per parameter

forward:                       # parity forward-estimate confidence heuristics (ForwardConfig)
  version: "2026.05.31"
  good_rel_residual: 1.0e-3          # rel. residual at/below which (with >=3 pairs) quality is "good"
  fair_rel_residual: 1.0e-2          # rel. residual at/below which (with >=2 pairs) quality is "fair"
  full_credit_pairs: 4.0             # used-pair count at which the count term saturates to 1.0
  rel_residual_halflife: 1.0e-3      # relative residual that halves the fit term
  single_pair_confidence: 0.30       # confidence for a one-pair fallback (structurally low)
  rate: null                         # explicit interest rate r (flat) for the carry/dividend split
                                     # q = r − ln(F/S)/T (Eq 5). null = use the parity-DF-implied
                                     # rate −ln(DF)/T (unchanged); set a number (e.g. 0.0) to make
                                     # r an explicit, modifiable input (T-explicit-rate-parameter).
