# pricing.yaml — IV inversion and pricing parameters (blueprint Part VII).
#
# HASHED (config_hashes["pricing"]). Solver tolerances and bounds change computed
# values, so they are reproducibility inputs.
#
# Increment 1 carries the SolverConfig fields; the solver vol bounds (vol_min/vol_max),
# SVI bounds/tolerances, and forward-confidence heuristics join here in C7 increment 2.
version: "2026.05.31"
iv_tolerance: 1.0e-8          # implied-vol inversion convergence tolerance
max_iterations: 100
