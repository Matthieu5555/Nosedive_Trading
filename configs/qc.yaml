# qc.yaml — quote/chain quality cut-offs (blueprint Part VII).
#
# HASHED (config_hashes["qc"]). These thresholds decide whether a quote or chain is
# usable, so they shape which records survive QC and must be reproducible.
#
# Increment 1 carries the QcThresholdConfig fields; the blueprint's `forward_engine`,
# fit-tolerance, and anomaly z-band blocks join here in C7 increment 2.
version: "2026.05.31"
max_spread_pct: 0.05          # reject quotes wider than 5% of mid
max_quote_age_seconds: 30.0   # an option quote older than this is stale
min_chain_count: 6            # minimum eligible calls+puts per maturity

# Grid-aware QC cut-offs (WS 1H). These validate the projected (tenor × delta-band) grid
# as a grid, not as a flat chain. They are economic — they decide whether a day's grid is
# judged complete — so they are hashed here in config, never as `.py` literals (ADR 0028).
grid:
  version: "2026.06.16"
  # Per-tenor minimum usable-point count, keyed on the P0.1 pinned tenor grid (10d…3y).
  # ADR 0052: this is now the WITHIN-LIQUID-RANGE floor — it is the CRITICAL teeth only on
  # tenors that sit inside the captured liquid maturity span (where the surface is genuinely
  # liquid and a collapse below the floor is a real defect). Edge pinned tenors that require
  # extrapolation beyond the liquid range (e.g. 2y/3y past the longest liquid expiry, or 10d
  # below the front) are a labelled fallback (WARNING), not a CRITICAL. Interior pins with no
  # direct capture are filled by Eq.-22 total-variance interpolation and count as covered.
  # A pinned tenor with no entry here is a config error (the check raises, never defaults to
  # zero).
  tenor_floors:
    "10d": 5
    "1m": 5
    "3m": 5
    "6m": 5
    "12m": 5
    "18m": 5
    "2y": 5
    "3y": 5
  # The signed delta band the selected strikes must span: the 30Δ put → ATM → 30Δ call
  # window (WS 1B). Edges come from config, never from the data under test.
  band_low_delta: -0.30
  band_high_delta: 0.30
  # The projection's delta-band emission spacing — the prof's ±30Δ *pas-2* grid (ADR 0028).
  # The WS-1F projection builds its axis from these three numbers via
  # ProjectionConfig.from_band, so the grid emitted and the grid validated cannot drift.
  band_step: 0.02
  # The largest acceptable gap between consecutive selected deltas inside the band; a hole
  # wider than this is a completeness breach. Set equal to band_step so the QC *forces* the
  # pas-2 grid: a dropped point opens a 0.04 hole (2·band_step) and fails (was 0.25 — a
  # coarser grid passed silently, the intent-vs-delivery bug this fix closes).
  max_delta_step: 0.02
  # Coverage is a RATIO over the monitored (liquid) range, not a flat per-tenor floor
  # (ADR 0052, blueprint 14-slos: ">95% of monitored maturities"). The share of interior
  # pinned tenors that are covered (direct capture OR Eq.-22 interpolatable between two liquid
  # neighbours) must clear this; below it the liquid core has genuinely collapsed → CRITICAL.
  monitored_coverage_ratio: 0.95
  # Calendar sanity (Eq. 21) pages CRITICAL only on a MATERIAL/GROSS variance inversion
  # (blueprint 02-math-framework: "obvious calendar inconsistencies … gross pathologies").
  # A breach w_short>w_long is sub-threshold noise — and at most a WARNING — unless the gap
  # exceeds BOTH an absolute total-variance tolerance AND a fraction of the long-leg variance,
  # and the short leg sits at/above the ultra-short floor below. The observed 2026-06-16 SX5E
  # wiggle was ~2e-4 of total variance at the short end: below 5e-4, so it warns, never pages.
  calendar_abs_variance_tol: 0.0005
  calendar_rel_variance_tol: 0.05
  # Maturities below this (years ≈ the front weekly, ~2 weeks) are ultra-short: their variances
  # are numerically noisy, so a calendar inversion that touches them is at most a WARNING
  # (blueprint 05-math-notes: low-confidence / mark-unusable, never a hard fail).
  ultra_short_maturity_years: 0.038356164383561646

# Collector-continuity cut-offs (C7 increment 2). Economic — they decide whether a capture
# session is continuous enough to trust — so hashed here, never `.py` literals (ADR 0028).
continuity:
  version: "2026.05.31"
  max_gap_count: 5            # at most this many gap events before the session fails
  warn_gap_count: 1          # above this (but <= max) warns; must be <= max_gap_count
  min_coverage_ratio: 0.95   # fraction of subscribed instruments that must be covered

# Forward-stability + parity-residual cut-offs (C7 increment 2). Economic (they gate which
# forwards/curve points survive QC), so hashed here, never `.py` literals (ADR 0028).
forward_engine:
  version: "2026.06.12"
  # Residual cut-offs are RELATIVE to the forward (a fraction of F), not absolute price
  # points: an absolute $ cut-off was an always-FAIL false positive on a 7400-pt index
  # (T-qc-residual-units). max_rel_residual_mad is aligned to the forward engine's
  # fair_rel_residual (pricing.yaml) so the diagnostic self-label and this QC gate share one
  # basis (poor label <=> QC fail). First relative bars — teeth to retune once a real term
  # structure is banked (ultra-short calendar noise is a separate, tenor-root symptom).
  max_rel_residual_mad: 0.01     # largest acceptable parity-line residual MAD / forward
  min_forward_confidence: 0.5    # lowest acceptable forward-estimate confidence (0..1)
  max_rel_parity_residual: 0.02  # largest acceptable single |parity residual| / forward

# IV-convergence + surface-fit cut-offs (C7 increment 2). Economic (they gate which smiles
# and slice fits survive QC), so hashed here, never `.py` literals (ADR 0028).
fit_tolerance:
  version: "2026.06.18"
  max_non_convergence_ratio: 0.10  # largest acceptable solver non-convergence fraction (0..1)
  # Total-variance RMSE limb. RETAINED but no longer the SOLE driver of surface_fit_error: total
  # variance ~ iv^2 * T collapses toward zero at short maturities, so the largest stored SX5E
  # total-variance RMSE (~3.3e-4) sat ~60x below this and this limb NEVER fired. It still trips on a
  # genuinely gross long-dated misfit; the IV-space limbs below carry the short-end teeth.
  max_surface_rmse: 0.02           # largest acceptable per-slice RMSE (total-variance units)
  # IV-SPACE fit-error teeth (T-invariant, in VOL POINTS) — what a PM actually reads, and the limb
  # that catches near-dated contamination the total-variance limb is blind to. `iv_rmse` is
  # sqrt(mean((SVI_iv(k) - market_iv)^2)) per slice (surface diagnostics `iv_rmse`). WARN above the
  # warn band, FAIL above the fail band. A clean SX5E slice fits to << 1 vol point; the stale-ATM-put
  # 2026-06-18 front slice scatters to ~8-9 vol points, so the bands sit between.
  warn_iv_rmse: 0.015              # >1.5 vol points off the market cloud -> WARN
  max_iv_rmse: 0.03                # >3 vol points off the market cloud -> FAIL
  # IV-DISPERSION / outlier teeth: the share of a slice's market IV points sitting more than the
  # per-point outlier band (5 vol points, surfaces.fit._IV_OUTLIER_BAND_VOL_POINTS) off the fitted
  # curve. Catches a CLEAN aggregate fit contaminated by a few stale quotes (the 2026-06-18 slice: 3
  # stale ATM puts at ~0.60 against a ~0.19 cloud). Above this fraction the slice FAILs.
  max_iv_outlier_fraction: 0.10    # >10% of points are gross outliers -> FAIL

# Anomaly bands (C7 increment 2). The static-check MAD multiplier and the rolling-baseline
# robust-z warn/fail bands + minimum baseline length. Economic (they decide whether a metric
# shifted abnormally), so hashed here, never `.py` literals (ADR 0028).
anomaly:
  version: "2026.05.31"
  mad_multiplier: 5.0   # static-check spike cut-off, in baseline MADs from the median
  warn_z: 3.5           # rolling-baseline |robust z| WARN band
  fail_z: 5.0           # rolling-baseline FAIL band; must be >= warn_z
  min_baseline: 10      # fewer baseline points than this -> NO_BASELINE, never assumed normal

# Capture-time quote-integrity floor (EMERGENCY-quote-integrity-gate). The 2026-06-15 SX5E canary
# banked a converged surface off a CLOSED market: every snapshot row had bid<=0, ask<=0, bid==ask
# (no two-sided quote), completeness=0.333 (only `last`), flags=["closed","fallback_spot"]. The IV
# solver fit `last` alone into a plausible-looking surface and nothing refused it at the capture
# boundary. This cut-off turns completeness/flags from inert scalars into a hard floor: below it the
# close-capture path returns a labelled no-capture (None + a `closed_market` reason), never a fit.
# Economic (it decides whether a day's basket is banked at all) → hashed here, never a `.py` literal.
quote_integrity:
  version: "2026.06.15"
  # The smallest fraction of an underlying's promotable option rows that must carry a healthy
  # two-sided quote (positive, uncrossed bid AND ask) for the basket to be banked. The canary
  # fraction was 0.0 (every row last-only); a genuine two-sided close is 1.0. Set above 0 so the
  # all-last-only basket is refused while a real close passes untouched.
  min_two_sided_fraction: 0.10
