# scenarios.yaml — the stress grid the risk engine applies (blueprint Part VII).
#
# HASHED (config_hashes["scenarios"]). The shock grid defines the risk numbers, so it
# is a reproducibility input.
#
# Increment 1 carries the ScenarioConfig fields; named scenarios, combinations, report
# subsets, and `roll_down_days` join here in C7 increment 2.
version: "2026.05.31"
spot_shocks: [-0.10, -0.05, 0.0, 0.05, 0.10]   # fractional spot moves
vol_shocks: [-0.05, 0.0, 0.05]                  # absolute vol moves
roll_down_days: [1]                             # time-roll scenarios (days), one per entry
