# universe.yaml — which instruments the platform tracks (blueprint Part VII).
#
# HASHED. Changes here change which records exist, so this bundle enters the
# reproducibility hashes (config_hashes["universe"], C7 / ADR 0028). `version` is a
# human label only — the content hash is authoritative.
#
# Increment 1 carries the UniverseConfig fields; the strike-selection delta band
# (`ChainSelection`) and capture cadence join here in C7 increment 2.
version: "2026.05.31"
underlyings: [AAPL, MSFT, SPY]
exchange: SMART

# Delta-band strike selection (WS 1B, ADR 0028). The 30Δ bound is economic — it decides
# which strikes the captured chain holds — so it is hashed config here, never a `.py`
# literal (the C7 audited "ChainSelection (delta band)" hardcode site). The band keeps,
# per tenor, the contiguous block of listed strikes from the 30Δ put through ATM to the
# 30Δ call.
#   - delta_bound: the absolute (unsigned) delta cut. 0.30 = the 30-delta band.
#   - delta_convention: which delta the bound is read against. Built at carry == 0 (the
#     pricer's `from_forward(spot=None)`), where spot delta and forward delta coincide;
#     `forward_undiscounted` measures the bound against N(d1) (the undiscounted forward
#     delta), `spot_discounted` against the engine's discounted spot delta (DF·N(d1)).
#     A typo is rejected (ConfigFieldError), never silently defaulted.
#   - min_strikes_per_side: the per-tenor floor — keep at least this many nearest-the-money
#     strikes each side of the forward even when fewer fall inside the delta window, so a
#     thin tenor still yields a fittable slice (a labeled floor, not an empty silent result).
#   - discovery_working_vol: the conservative working vol that SIZES the discovery strike window
#     (T-delta-window). The fitted vol the economic 30Δ band uses is only known downstream, so
#     discovery sizes a delta-driven, tenor-aware SUPERSET of the band with this seed vol (the
#     band edges grow with √T). It is a request-shaping sizing seed, NOT an economic band
#     selector — the band is chosen downstream with the fitted vol — set conservative-HIGH so we
#     over-qualify, never clip (under-sizing re-creates the ±~1% clip this fix killed). One value,
#     not per-index: adding an index stays "conid + enabled". If a genuinely more volatile index
#     ever clips, delta_band_completeness QC turns red and an override is added then, data-driven.
strike_selection:
  version: "2026.06.12"
  delta_bound: 0.30
  delta_convention: forward_undiscounted
  min_strikes_per_side: 2
  discovery_working_vol: 0.40

# Tenor grid (P0.1 / OQ-4, ADR 0036): the ordered standard maturities analytics project
# the surface/Greeks onto. Authoritative copy is the blueprint Part IX data dictionary
# (ADR 0011); this must equal it as an ordered list (a test guards the drift). Economic →
# enters config_hashes["universe"]. Order is meaningful — kept as written.
tenor_grid: ["10d", "1m", "3m", "6m", "12m", "18m", "2y", "3y"]

# Index registry (ADR 0035): which indices the platform tracks. Keyed by index symbol —
# the same `index` key 1A membership, 1C capture, 1G cron, and the 1I picker consume.
# HASHED: this block lives in universe.yaml and changes which records exist (enabling an
# index starts its snapshots/bars landing), so it travels inside config_hashes["universe"]
# with no separate hash.
#
# Per-field rules (validated by IndexRegistry at load, never silently defaulted):
#   - calendar: an exchange_calendars MIC code; the close instant is DERIVED from it at run
#     time (not stored). A typo is rejected, never defaulted (a wrong calendar = wrong close
#     instant = a look-ahead bug).
#   - currency: 3-letter uppercase ISO code.
#   - ibkr: the provider-specific sub-block (conid/secType/exchange). The other fields are
#     provider-agnostic; a future saxo:/deribit: sibling joins under the same key (ADR 0023).
#   - enabled: the scheduler's on/off switch.
#
# SX5E is `enabled: true` (the single live focus pipeline); SPX is `enabled: false` (parked,
# see its note) so the scheduler's enabled_indices() surfaces SX5E alone and the live EOD spine
# (1G fire → 1J calendar close → close-capture → project_grid → persist) exercises it end to
# end. The exchange-calendar / projection / persistence path uses ONLY the calendar code,
# currency, and symbol — never the IBKR conid — so enabling with a placeholder conid fully
# exercises that path today.
#
# CONID STATUS — UNVERIFIED PLACEHOLDER (conid: 0). The IBKR numeric contract id is consumed
# only by the 1C broker→raw-event qualification seam, which is NOT yet closed in production, so a
# placeholder conid cannot mis-resolve a live contract here (no IBKR qualification runs against
# it yet). It is deliberately left at 0 rather than guessed: a wrong conid would silently qualify
# the wrong contract (a look-alike-but-wrong index), which is worse than a loud failure.
# TODO(1C): before the IBKR collection bridge qualifies these, replace conid: 0 with the real,
# verified IBKR contract ids — look them up via the IBKR Client-Portal contract search
# (`/iserver/secdef/search?symbol=SPX|SX5E`, filter secType=IND, exchange=CBOE|EUREX) or TWS
# contract details, and confirm against a live qualify before flipping the conid in. Until then
# any attempt to qualify these indices through IBKR must fail loudly on the placeholder conid,
# never silently capture a wrong contract.
indices:
  SX5E:
    name: "EURO STOXX 50"
    calendar: XEUR
    currency: EUR
    # IBKR lists Euro Stoxx 50 as ESTX50 (NOT SX5E) — `symbol` is the secdef search override; the
    # registry key SX5E stays the platform-wide vocabulary. conid + symbol VERIFIED live 2026-06-08
    # (secdef/search symbol=ESTX50, secType=IND, exchange=EUREX → conid 4356500).
    #
    # constituent_conids: verified-conid pins for constituents the bare-ticker secdef search cannot
    # resolve. The Euro Stoxx 50 carries TWO members on ticker "SAN" — Banco Santander (Bolsa de
    # Madrid) and Sanofi (Euronext Paris). A `symbol=SAN` search returns Santander (BM is a EUR
    # venue), so Sanofi is shadowed and never captured. IBKR disambiguates Sanofi as "SAN1"; pinning
    # its conid is the only way to also capture it. VERIFIED live 2026-06-12 (secdef by ISIN
    # FR0000120578 → conid 29612249, symbol SAN1, /marketdata/history last close ~€76). Sanofi's
    # bars store under underlying "SAN1".
    #   Nordea (NDA FI, ISIN FI4000297767 → 335134428 Helsinki / 335033105 Stockholm) is a verified
    #   member but its daily history returns HTTP 500 / 0 bars over this gateway on BOTH venues — a
    #   Nordic market-data ENTITLEMENT gap, not a resolution bug. It is deliberately NOT pinned: a
    #   conid that serves no history is worse than a loud miss (the ticker lands in `failed`, logged).
    #   Add `NDA FI: <conid>` here once the Nordic market-data subscription is enabled and verifies.
    ibkr:
      conid: 4356500
      secType: IND
      exchange: EUREX
      symbol: ESTX50
      constituent_conids:
        SAN1: 29612249  # Sanofi (Euronext Paris) — see note above
    enabled: true
  SPX:
    name: "S&P 500"
    calendar: XNYS
    currency: USD
    # conid VERIFIED live 2026-06-08 (secdef/search symbol=SPX, secType=IND, exchange=CBOE).
    ibkr: { conid: 416904, secType: IND, exchange: CBOE }
    # PARKED (2026-06-13, T-index-only-refactor): kept in the registry as the living
    # multi-index proof, but disabled so the scheduler captures/projects SX5E alone while
    # the app is stabilised on a single live pipeline. Re-enable = flip this one flag.
    enabled: false
