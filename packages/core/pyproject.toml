[project]
name = "algotrading-core"
version = "0.1.0"
description = "Shared foundation (level 0): config, structured logging, provenance, run manifest. Domain-agnostic, light dependencies."
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Native-namespace package: algotrading/ has no __init__; algotrading/core/ is the package.
packages = ["src/algotrading"]
