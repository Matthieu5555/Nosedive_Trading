# IBKR capture configuration.
#
# Strike selection is a configuration rule, never scattered constants in the capture scripts: the
# shared selector (algotrading.infra.collectors.strike_selection) reads the collection: block below
# and applies it identically to every provider. IBKR resolves symbols live against the running
# TWS/Gateway, so there is no pre-listed underlying universe here (unlike Saxo).
collection:
  max_strikes_per_session: 90   # IBKR allows ~100 simultaneous market-data lines; headroom for the underlying
  strike_window_mode: atm       # centre each expiry window on the spot (the forward needs ATM pairs)
  n_expiries: 4                 # nearest maturities to span, for a term structure
  # Discovery maturity window (days). min_days=25 skips near-term weeklies, whose wide spreads
  # corrupt the implied forward; the surface then fits on clean monthly chains.
  min_days: 25
  max_days: 90
