[project]
name = "algotrading-infra-ibkr"
version = "0.1.0"
description = "Broker leaf adapter (ibkr): connectivity + collectors implementing the frozen BrokerSession seam. Owner: M5."
requires-python = ">=3.13"
dependencies = [
    "algotrading-infra",
]

# The IBKR live path rides Nautilus's shipped InteractiveBrokers adapter (ADR 0023), pulled by
# the `[ib]` extra of nautilus-trader (which brings `nautilus-ibapi`). It is an OPTIONAL extra,
# deliberately absent from the gate env (ADR 0018): the live wiring is import-guarded and its
# tests skip without it, so the package type-checks and the gate runs (replay + unit only)
# without a TWS Gateway. Install the live path with `uv sync --extra ibkr`.
[project.optional-dependencies]
ibkr = ["nautilus-trader[ib]"]

[tool.uv.sources]
algotrading-infra = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/algotrading"]
