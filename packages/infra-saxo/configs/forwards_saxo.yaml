# Saxo Bank forward-curve bounds for IV surface computation.
# These bounds constrain the risk-free rate used in the Black-Scholes / SVI forward
# calculation. Values match the observable range for the underlying markets.
# day_count: ACT/365F — consistent with infra/configs/forwards.yaml convention.

day_count: ACT/365F

regions:
  US:
    min_rate: -0.01     # floor: negative rates unlikely post-2022 but kept for robustness
    max_rate: 0.10      # cap: above Fed funds rate effective ceiling
    currencies: [USD]

  EU:
    min_rate: -0.10     # floor: negative ECB deposit rates observed 2014–2022
    max_rate: 0.05      # cap: above ECB peak 2023
    currencies: [EUR, GBP, CHF]

# Dividend yield bounds (used for ETF forward adjustment)
dividend:
  min_yield: 0.0
  max_yield: 0.10
