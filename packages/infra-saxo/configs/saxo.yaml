# Saxo environment selection.
#
# This is the canonical default. Override at runtime with the CLI flag `--env`
# or the `SAXO_ENV` environment variable (precedence: --env > SAXO_ENV > this file).
#
# Secrets (access/refresh tokens, client id/secret) live in .env, NEVER here.
environment: sim          # sim | live  (options data requires live; sim is Forex-only)

# Options market data on a funded live account is 15-minute delayed by default (free).
# Carried as provenance so downstream staleness logic ages delayed quotes correctly
# rather than treating them as real-time.
expected_delay_minutes: 15
