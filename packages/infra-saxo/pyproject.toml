[project]
name = "algotrading-infra-saxo"
version = "0.1.0"
description = "Broker leaf adapter (saxo): connectivity + collectors implementing the frozen BrokerSession seam. Owner: M5."
requires-python = ">=3.13"
dependencies = [
    "algotrading-infra",
    "httpx>=0.27",
    "websockets>=12",
]

[tool.uv.sources]
algotrading-infra = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/algotrading"]
