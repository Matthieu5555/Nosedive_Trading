[project]
name = "algotrading-infra"
version = "0.1.0"
description = "Volatility infrastructure layer: market-data capture, instrument master, snapshots, forward/IV/surface/pricing analytics, risk, storage. Strategy-agnostic."
requires-python = ">=3.13"
dependencies = [
    "algotrading-core",
    "apscheduler>=3.11.2",
    "duckdb>=1.5.3",
    # nautilus_trader is the runtime spine (ADR 0023): its replay/backtest engine + actor host
    # drive our pure analytics. It caps pandas at <3, hence the relaxed pandas pin below — no
    # source module imports pandas (the core is polars/pyarrow/duckdb/numpy), so the downgrade
    # from 3.x to 2.3.x is inert.
    "exchange-calendars>=4.13.2",
    "nautilus-trader>=1.227",
    "numpy>=2.4.6",
    "pandas>=2.3",
    "polars>=1.41.2",
    "prometheus-client>=0.25.0",
    "py-vollib>=1.0.12",
    "pyarrow>=24.0.0",
    "pydantic>=2",
    "pytz>=2026.2",
    "quantlib>=1.42.1",
    "scipy>=1.17.1",
    "sqlalchemy>=2.0",
    "structlog>=25.5.0",
    "tenacity>=9.1.4",
    "tzdata>=2024.1",
]

[project.optional-dependencies]
# Install with: uv sync --extra postgres
# Required by SqlRunRepository (storage.sql_repositories) when POSTGRES_URL selects the Postgres backend.
postgres = ["psycopg[binary]>=3.2"]

[tool.uv.sources]
algotrading-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/algotrading"]
