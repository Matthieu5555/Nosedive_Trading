[project]
name = "algotrading-strategy"
version = "0.1.0"
description = "algotrading.strategy — skeleton layer above infra. Imports infra/core only; never imported by them."
requires-python = ">=3.13"
dependencies = [
    "algotrading-infra",
]

[tool.uv.sources]
algotrading-infra = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/algotrading"]
