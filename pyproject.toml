# Workspace root for the AlgoTrading volatility-infrastructure monorepo.
#
# Virtual workspace (no root package): every layer is a member package under
# `packages/`, plus the cross-package app under `apps/`. One venv, one lock.
# Layering is `core <- infra <- {infra-<broker>} <- {strategy,execution} <- frontend`,
# enforced mechanically by import-linter (a layer never imports a layer above it).
#
# Full quality gate (AGENTS.md "Verify before you declare done"):
#     uv run ruff check . && uv run mypy . && uv run lint-imports && uv run pytest -q

[tool.uv.workspace]
members = [
    "packages/core",
    "packages/infra",
    "packages/infra-ibkr",
    "packages/strategy",
    "packages/execution",
    "apps/frontend",
]
# The read-only reference checkout is not a workspace member.
exclude = ["Vincent's Code"]

[dependency-groups]
dev = [
    "detect-secrets>=1.5.0",
    "hypothesis>=6.155.1",
    "import-linter>=2.0",
    "mypy>=2.1.0",
    "pip-audit>=2.10.1",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.15",
    "types-pyyaml>=6.0.12.20260518",
]
# Tooling to run the demo notebooks (notebooks/*.ipynb). Not part of the gate.
notebooks = [
    "matplotlib>=3.9",
    "jupyterlab>=4.0",
    "jupytext>=1.16",
    "plotly>=6.8.0",
    "ipykernel>=7.2.0",
    "nbconvert>=7.16",
    "kaleido>=1.3.0",
]

# --- Lint -----------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py313"
# `ruff check .` lints the workspace (packages/ + apps/) plus `scripts/` — the
# operator CLI tooling, in the gate since the 2026-06 maintainability audit (M24):
# it holds the production EOD entrypoint the systemd timer fires. The read-only
# reference checkout, notebooks, and scratch dirs stay out.
extend-exclude = [
    "notebooks",
    "Vincent's Code",
    "Test Lenny",
    "ThomasHossen",
    "research",
    "data",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.ruff.lint.per-file-ignores]
# Tests tolerate long lines (fixtures, hand-computed oracle values in comments).
"packages/*/tests/**/*.py" = ["E501"]
"apps/*/tests/**/*.py" = ["E501"]

# --- Types ----------------------------------------------------------------
[tool.mypy]
python_version = "3.13"
explicit_package_bases = true
namespace_packages = true
# Map files under each package's src/ to the `algotrading.*` name (not a
# `packages.core.src...` alias), so `mypy .` resolves each source file once.
mypy_path = "packages/core/src:packages/infra/src:packages/infra-ibkr/src:packages/strategy/src:packages/execution/src:apps/frontend/src"
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
strict_equality = true
# Workspace packages are installed editable by `uv sync`; import them by name.
# `scripts/` (operator CLI tooling, incl. the production EOD entrypoint) is in the
# gate since the 2026-06 maintainability audit (M24).
files = ["packages", "apps", "scripts"]
# `mypy .` must not wander into the read-only reference checkout, scratch dirs,
# or per-package test dirs (which share the name `tests` and would collide under
# the workspace). Tests run under pytest, not mypy; `notebooks/` stays out.
exclude = [
    "Vincent's Code/",
    "Test Lenny/",
    "ThomasHossen/",
    "notebooks/",
    "/tests/",
]

[[tool.mypy.overrides]]
module = ["duckdb.*", "pyarrow.*"]
ignore_missing_imports = true

# Analytics / pricing libraries that ship no type stubs.
[[tool.mypy.overrides]]
module = ["QuantLib.*", "scipy.*", "vollib.*", "py_vollib.*", "py_lets_be_rational.*"]
ignore_missing_imports = true

# Orchestration scheduler (apscheduler 3.x) ships no stubs.
[[tool.mypy.overrides]]
module = ["apscheduler.*"]
ignore_missing_imports = true

# Exchange-calendar library (ADR 0035) — drives the per-index session close; ships no stubs.
[[tool.mypy.overrides]]
module = ["exchange_calendars.*"]
ignore_missing_imports = true

# TWS socket SDK (`nautilus-ibapi`, pulled in by the nautilus spine): installed but
# ships no py.typed/stubs; imported lazily by `infra_ibkr.connectivity.nautilus_ibkr`.
# (`ib_async.*` left this list when the last importer — scripts/ibkr_bootstrap.py and
# the hand-rolled transport modules — was deleted, 2026-06 audit wave 1 + M24.)
[[tool.mypy.overrides]]
module = ["ibapi.*"]
ignore_missing_imports = true

# Postgres driver is an optional extra (`postgres`), absent from the gate env and
# imported lazily inside the Postgres run-registry backend only.
[[tool.mypy.overrides]]
module = ["psycopg.*"]
ignore_missing_imports = true

# nautilus_trader is the runtime spine (ADR 0023). It ships `py.typed`, but its compiled
# Cython submodules (backtest/common/model/core) carry no stubs, so mypy cannot resolve
# them — treat the package as untyped at the import boundary; our own code stays typed.
[[tool.mypy.overrides]]
module = ["nautilus_trader.*"]
ignore_missing_imports = true

# Tooling the operator scripts pull in ephemerally or via the `notebooks` dependency
# group (scripts/README.md) — absent from the gate env, so mypy cannot resolve it.
[[tool.mypy.overrides]]
module = ["mistune.*", "nbformat.*", "plotly.*", "selenium.*"]
ignore_missing_imports = true

# The committed offline chain fixtures (packages/infra/tests/fixtures) are imported by
# name after a sys.path insert (scripts/smoke_e2e.py; pytest gets them via `pythonpath`).
# mypy excludes /tests/, so it cannot resolve that package.
[[tool.mypy.overrides]]
module = ["fixtures.*"]
ignore_missing_imports = true

# --- Layering enforcement (import-linter) ---------------------------------
[tool.importlinter]
root_packages = ["algotrading"]

[[tool.importlinter.contracts]]
name = "Layered architecture: a layer never imports a layer above it"
type = "layers"
# Upper layers are optional (parentheses): the contract holds with only core+infra
# present and auto-tightens as strategy/execution/frontend fill in. The broker leaf
# package (IBKR — Saxo/Deribit removed in T-index-only-refactor) sits above infra and
# below the alpha layers.
layers = [
    "(algotrading.frontend)",
    "(algotrading.execution)",
    "(algotrading.strategy)",
    "(algotrading.infra_ibkr)",
    "algotrading.infra",
    "algotrading.core",
]

[[tool.importlinter.contracts]]
name = "infra is blind to alpha (must not import strategy/execution/frontend)"
type = "forbidden"
source_modules = ["algotrading.infra"]
forbidden_modules = [
    "algotrading.strategy",
    "algotrading.execution",
    "algotrading.frontend",
]

# --- Tests ----------------------------------------------------------------
[tool.pytest.ini_options]
# importmode=importlib avoids conftest module-name collisions across packages.
addopts = "-q --import-mode=importlib"
# The shared fixture library (the rogues' gallery + known-answer generators) lives under
# packages/infra/tests/fixtures and is imported by name (`from fixtures.synthetic import ...`)
# across the analytics/risk/qc tests; pythonpath makes that top-level `fixtures` package
# importable under importlib mode without installing it into the runtime packages.
pythonpath = ["packages/infra/tests"]
testpaths = [
    "packages/core/tests",
    "packages/infra/tests",
    "packages/infra-ibkr/tests",
    "packages/execution/tests",
    "packages/strategy/tests",
    "apps/frontend/tests",
]

# --- Coverage floor on the pure-function core (tasks/TESTING.md) -----------
# Branch coverage on the analytics + risk core. Starts at 90 and only ever rises.
# Kept out of the default `-q` gate (run with `uv run pytest --cov`): a targeted
# single-module run would otherwise trip the whole-core threshold.
[tool.coverage.run]
branch = true
source = [
    "algotrading.infra.snapshots",
    "algotrading.infra.forwards",
    "algotrading.infra.iv",
    "algotrading.infra.surfaces",
    "algotrading.infra.pricing",
    "algotrading.infra.utils",
    "algotrading.infra.risk",
]

[tool.coverage.report]
fail_under = 90
show_missing = true
precision = 1
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "^\\s*\\.\\.\\.$",
    "if __name__ == .__main__.:",
]
